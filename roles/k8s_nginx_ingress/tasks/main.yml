---
- name: Install NGINX Ingress Controller
  ansible.builtin.command:
    cmd: "kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/{{ nginx_ingress_version }}/deploy/static/provider/baremetal/deploy.yaml"
  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"
  register: ingress_result
  changed_when: "'created' in ingress_result.stdout or 'configured' in ingress_result.stdout"

- name: Patch Ingress Service to LoadBalancer type
  ansible.builtin.command:
    cmd: >
      kubectl patch svc ingress-nginx-controller 
      -n ingress-nginx 
      -p '{"spec": {"type": "LoadBalancer"}}'
  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"
  changed_when: true

- name: Wait for Ingress Controller pods to be ready
  ansible.builtin.command:
    cmd: "kubectl wait --namespace ingress-nginx --for=condition=ready pod --selector=app.kubernetes.io/component=controller --timeout=120s"
  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"
  changed_when: false

- name: Wait for External IP from MetalLB
  ansible.builtin.shell: |
    kubectl get svc ingress-nginx-controller -n ingress-nginx -o jsonpath='{.status.loadBalancer.ingress[0].ip}'
  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"
  register: ingress_ip
  until: ingress_ip.stdout != ""
  retries: 10
  delay: 5
  changed_when: false

- name: Show Ingress IP address
  ansible.builtin.debug:
    msg: "NGINX Ingress is ready! External IP: {{ ingress_ip.stdout }}"
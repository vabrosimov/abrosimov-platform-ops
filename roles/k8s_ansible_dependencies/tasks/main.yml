- name: Install Python dependencies for Kubernetes modules
  ansible.builtin.apt:
    name:
      - python3-kubernetes  # для kubernetes.core модуля ansible
      - python3-yaml        # для парсинга манифестов
    state: present
    update_cache: true
  become: true

- name: Install Helm
  ansible.builtin.shell: "curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash"
  args:
    creates: /usr/local/bin/helm
  become: true
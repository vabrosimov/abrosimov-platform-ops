---
- name: Initialize Kubernetes cluster
  become: yes
  command: >
    kubeadm init 
    --pod-network-cidr={{ pod_network_cidr }}
    --apiserver-advertise-address={{ ansible_host }}
  args:
    creates: "{{ kubeconfig_path }}"

- name: Create .kube directory for the Ansible user
  file:
    path: "/home/{{ ansible_user }}/.kube"
    state: directory
    mode: '0755'
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"

- name: Create .kube directory for default user
  file:
    path: "/home/{{ cluster_user }}/.kube"
    state: directory
    mode: '0755'
    owner: "{{ cluster_user }}"
    group: "{{ cluster_user }}"
  become: true

- name: Copy admin.conf to Ansible's kube config
  become: yes
  copy:
    src: "{{ kubeconfig_path }}"
    dest: "/home/{{ ansible_user }}/.kube/config"
    remote_src: yes
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0600'

- name: Copy admin.conf to default user's kube config
  become: yes
  copy:
    src: "{{ kubeconfig_path }}"
    dest: "/home/{{ cluster_user }}/.kube/config"
    remote_src: yes
    owner: "{{ cluster_user }}"
    group: "{{ cluster_user }}"
    mode: '0600'

- name: Generate join command
  become: yes
  command: kubeadm token create --print-join-command
  register: join_command_raw
  changed_when: false

- name: Set join command as a global fact
  set_fact:
    kubernetes_join_command: "{{ join_command_raw.stdout }}"